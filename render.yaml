services:
  - type: web
    name: whatsapp-ai-portal
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /var/data
      - key: APP_SECRET
        generateValue: true
      - key: DATA_SECRET
        generateValue: true
      - key: FORGOT_WHATSAPP_NUMBER
        sync: false
      - key: GOOGLE_SHEET_ID
        sync: false
      - key: GOOGLE_SHEET_RANGE
        value: Users!A:E
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: OPENAI_RESPONSES_URL
        value: https://api.openai.com/v1/responses
      - key: OPENAI_TRANSCRIPTIONS_URL
        value: https://api.openai.com/v1/audio/transcriptions
      - key: OPENAI_TRANSCRIPTION_MODEL
        value: gpt-4o-mini-transcribe
    disk:
      name: whatsapp-data
      mountPath: /var/data
      sizeGB: 5
